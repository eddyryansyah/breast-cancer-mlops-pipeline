name: MLflow Project CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-build-docker:
    runs-on: ubuntu-latest

    env:
      DOCKER_IMAGE_NAME: breast-cancer-msml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt

      - name: Run MLflow Project
        run: |
          mlflow run MLProject --env-manager=local

      - name: Find logged MLflow model
        id: find_model
        run: |
          MODEL_PATH=$(find . -path "*/artifacts/model/MLmodel" | head -n 1 | sed 's#/MLmodel$##')

          if [ -z "$MODEL_PATH" ]; then
            echo "MLflow model artifact not found"
            exit 1
          fi

          echo "MODEL_PATH=$MODEL_PATH" >> $GITHUB_ENV
          echo "Found model path: $MODEL_PATH"

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-training-artifacts
          path: |
            mlruns
            MLProject/mlruns

      - name: Build Docker image with MLflow
        run: |
          mlflow build-docker \
            --model-uri "$MODEL_PATH" \
            --name "$DOCKER_IMAGE_NAME" \
            --enable-mlserver

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker image
        run: |
          docker tag "$DOCKER_IMAGE_NAME:latest" "${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_IMAGE_NAME:latest"

      - name: Push Docker image to Docker Hub
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_IMAGE_NAME:latest"
